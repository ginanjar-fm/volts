services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-volts}
      POSTGRES_DB: ${POSTGRES_DB:-volts}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-volts} -d ${POSTGRES_DB:-volts}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: builder
    entrypoint: ["npx", "tsx", "lib/db/migrate.ts"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-volts}:${POSTGRES_PASSWORD:-volts}@db:5432/${POSTGRES_DB:-volts}
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-volts}:${POSTGRES_PASSWORD:-volts}@db:5432/${POSTGRES_DB:-volts}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
